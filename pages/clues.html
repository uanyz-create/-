<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出海雷达 AI - 线索审计</title>
  <meta name="description" content="出海雷达 AI 线索审计 - 五维搜索、多维筛选、CSV/PDF导出">
  <!-- Open Graph -->
  <meta property="og:title" content="出海雷达 AI - 线索审计">
  <meta property="og:description" content="Bloomberg风格线索审计页，全量采购线索管理与分析。">
  <meta property="og:type" content="website">
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23F59E0B'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%230B0F19'/%3E%3Ccircle cx='16' cy='16' r='7' fill='none' stroke='%230B0F19' stroke-width='2' opacity='0.6'/%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='%230B0F19' stroke-width='1.5' opacity='0.3'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0B0F19;
      color: #E2E8F0;
      overflow: hidden;
    }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .gold { color: #F59E0B; }
    .gold-bg { background: #F59E0B; }
    .btn-gold { background: linear-gradient(135deg,#F59E0B,#D97706); color: #0B0F19; font-weight: 700; transition: all .2s; }
    .btn-gold:hover { box-shadow: 0 4px 20px rgba(245,158,11,.4); transform: translateY(-1px); }
    .btn-gold:active { transform: scale(.98); }
    .btn-sm { padding: 6px 14px; border-radius: 8px; font-size: 12px; }
    .btn-outline { border: 1px solid rgba(245,158,11,.3); color: #F59E0B; background: transparent; transition: all .2s; }
    .btn-outline:hover { background: rgba(245,158,11,.08); border-color: #F59E0B; }
    .card { background: #111827; border: 1px solid #1F2937; border-radius: 16px; }
    .card-inner { background: #0D1117; border: 1px solid #1A2233; border-radius: 12px; }
    .input-field {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px;
      padding: 8px 14px;
      color: #E2E8F0;
      font-size: 13px;
      outline: none;
      width: 100%;
      transition: border-color .2s;
    }
    .input-field:focus { border-color: #F59E0B; }
    .input-field::placeholder { color: #4B5563; }
    select.input-field { cursor: pointer; }
    /* Scrollbar */
    .main-scroll { overflow-y: auto; height: calc(100vh - 56px); }
    .main-scroll::-webkit-scrollbar { width: 4px; }
    .main-scroll::-webkit-scrollbar-thumb { background: rgba(245,158,11,.15); border-radius: 2px; }
    /* Table - Bloomberg style */
    .audit-table { width: 100%; border-collapse: collapse; }
    .audit-table th {
      text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .08em; color: #6B7280;
      border-bottom: 1px solid #1F2937; position: sticky; top: 0; background: #0D1117; z-index: 5;
      white-space: nowrap;
    }
    .audit-table th:hover { color: #F59E0B; cursor: pointer; }
    .audit-table td { padding: 8px 12px; font-size: 12px; border-bottom: 1px solid #131927; color: #D1D5DB; }
    .audit-table tr:hover td { background: rgba(245,158,11,.03); }
    /* Row expand */
    .row-detail { background: #0A0E17; }
    /* Score badges */
    .badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; display: inline-block; }
    .badge-high { background: rgba(239,68,68,.12); color: #EF4444; border: 1px solid rgba(239,68,68,.25); }
    .badge-med { background: rgba(245,158,11,.12); color: #F59E0B; border: 1px solid rgba(245,158,11,.25); }
    .badge-low { background: rgba(107,114,128,.12); color: #9CA3AF; border: 1px solid rgba(107,114,128,.25); }
    .badge-green { background: rgba(34,197,94,.12); color: #4ADE80; border: 1px solid rgba(34,197,94,.25); }
    .badge-blue { background: rgba(99,102,241,.12); color: #818CF8; border: 1px solid rgba(99,102,241,.25); }
    /* Tab */
    .tab-btn { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; transition: all .15s; color: #6B7280; cursor: pointer; white-space: nowrap; }
    .tab-btn.active { color: #F59E0B; background: rgba(245,158,11,.08); }
    /* Date range quick buttons */
    .date-btn { padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 500; transition: all .15s; color: #6B7280; cursor: pointer; border: 1px solid transparent; }
    .date-btn:hover { color: #E2E8F0; }
    .date-btn.active { color: #F59E0B; background: rgba(245,158,11,.08); border-color: rgba(245,158,11,.2); }
    /* Search dims */
    .dim-tab {
      padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 500;
      transition: all .15s; color: #6B7280; cursor: pointer; border-bottom: 2px solid transparent;
    }
    .dim-tab.active { color: #F59E0B; border-bottom-color: #F59E0B; }
    /* Modal */
    .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center; }
    .modal-box { background:#111827;border:1px solid rgba(245,158,11,.3);border-radius:20px;padding:28px;max-width:600px;width:90%;max-height:85vh;overflow-y:auto;animation:slideDown .3s; }
    @keyframes slideDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
    /* KPI */
    .kpi-card { background: #111827; border: 1px solid #1F2937; border-radius: 14px; padding: 16px; position: relative; overflow: hidden; }
    .kpi-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background: linear-gradient(90deg, transparent, #F59E0B, transparent); }
    /* Sparkline */
    .spark-bar { transition: height .4s cubic-bezier(.16,1,.3,1); min-height: 1px; border-radius: 1px 1px 0 0; }
    /* Toggle */
    .toggle { position: relative; width: 36px; height: 20px; background: #1F2937; border-radius: 10px; cursor: pointer; transition: background .2s; }
    .toggle.on { background: #F59E0B; }
    .toggle-knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #E2E8F0; border-radius: 50%; transition: transform .2s; }
    .toggle.on .toggle-knob { transform: translateX(16px); }
    /* Highlight search */
    .highlight { background: rgba(245,158,11,.2); color: #F59E0B; padding: 0 2px; border-radius: 2px; }
    /* Expanded row animation */
    @keyframes expandRow { from { opacity:0; max-height:0; } to { opacity:1; max-height:500px; } }
    .row-expand { animation: expandRow .3s ease-out; overflow: hidden; }
    /* Print */
    @media print {
      body { background: white; color: black; overflow: visible; }
      .no-print { display: none !important; }
      .card { background: white; border: 1px solid #ddd; }
      .audit-table th { background: white; color: #333; border-bottom: 2px solid #333; }
      .audit-table td { color: #333; border-bottom: 1px solid #eee; }
      .main-scroll { overflow: visible; height: auto; }
    }
    /* Checkbox */
    .check { width: 14px; height: 14px; border: 1.5px solid #374151; border-radius: 3px; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; justify-content: center; }
    .check.checked { background: #F59E0B; border-color: #F59E0B; }
    .check.checked::after { content: '✓'; color: #0B0F19; font-size: 10px; font-weight: bold; }
    /* Loading */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .8s linear infinite; }
    /* Mobile */
    @media(max-width:768px) {
      body { overflow: auto; }
      .desktop-only { display: none !important; }
      .audit-table { font-size: 11px; }
      .audit-table th, .audit-table td { padding: 6px 8px; }
    }
  </style>
</head>
<body x-data="clueAudit()" x-init="init()">

<!-- TOP BAR -->
<header class="flex items-center justify-between px-4 h-14 border-b flex-shrink-0" style="border-color:#1F2937; background:#0D1117; position:relative; z-index:50;">
  <div class="flex items-center gap-3">
    <a href="dashboard.html" class="flex items-center gap-2">
      <div class="w-7 h-7 rounded-lg gold-bg flex items-center justify-center">
        <svg class="w-4 h-4 text-gray-900" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M9 12l2 2 4-4"/><path d="M21 12c-1 0-3-1-3-3s2-3 3-3 3 1 3 3-2 3-3 3"/><path d="M3 12c1 0 3-1 3-3s-2-3-3-3-3 1-3 3 2 3 3 3"/><path d="M13 5l2-2"/><path d="M13 19l2 2"/>
        </svg>
      </div>
      <span class="text-sm font-bold text-white hidden sm:block">线索审计</span>
    </a>
    <span class="text-xs text-gray-600 hidden md:inline">|</span>
    <span class="text-xs text-gray-500 hidden md:inline" x-text="'共 ' + filteredClues.length + ' 条记录'"></span>
  </div>

  <div class="flex items-center gap-2">
    <!-- Export buttons -->
    <button @click="exportCSV()" class="btn-outline btn-sm flex items-center gap-1.5 no-print">
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span class="hidden sm:inline">CSV</span>
    </button>
    <button @click="exportPDF()" class="btn-gold btn-sm flex items-center gap-1.5 no-print">
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      <span class="hidden sm:inline">PDF</span>
    </button>
    <a href="dashboard.html" class="text-gray-500 hover:text-amber-400 transition-colors text-xs px-2 no-print">← 仪表盘</a>
  </div>
</header>

<main class="main-scroll p-4 md:p-6">

  <!-- SEARCH & FILTER BAR -->
  <div class="card p-4 mb-4 no-print">
    <!-- Bloomberg-style multi-dimension search -->
    <div class="flex flex-col gap-3">
      <!-- Search input with dimension tabs -->
      <div class="flex items-center gap-2">
        <div class="flex items-center gap-1 flex-shrink-0">
          <div class="dim-tab" :class="searchDim === 'all' ? 'active' : ''" @click="searchDim = 'all'">全部</div>
          <div class="dim-tab" :class="searchDim === 'buyer' ? 'active' : ''" @click="searchDim = 'buyer'">买家</div>
          <div class="dim-tab" :class="searchDim === 'country' ? 'active' : ''" @click="searchDim = 'country'">国家</div>
          <div class="dim-tab" :class="searchDim === 'source' ? 'active' : ''" @click="searchDim = 'source'">来源</div>
          <div class="dim-tab" :class="searchDim === 'keyword' ? 'active' : ''" @click="searchDim = 'keyword'">关键词</div>
          <div class="dim-tab" :class="searchDim === 'script' ? 'active' : ''" @click="searchDim = 'script'">话术</div>
        </div>
        <div class="flex-1 relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input x-model="searchQuery" type="text" class="input-field pl-10" :placeholder="searchPlaceholder">
          <button x-show="searchQuery" @click="searchQuery = ''" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-600 hover:text-white text-sm">✕</button>
        </div>
      </div>

      <!-- Filters row -->
      <div class="flex items-center gap-3 flex-wrap">
        <!-- Date range -->
        <div class="flex items-center gap-1.5">
          <span class="text-xs text-gray-500">时间:</span>
          <button class="date-btn" :class="dateRange === 7 ? 'active' : ''" @click="setDateRange(7)">7天</button>
          <button class="date-btn" :class="dateRange === 30 ? 'active' : ''" @click="setDateRange(30)">30天</button>
          <button class="date-btn" :class="dateRange === 90 ? 'active' : ''" @click="setDateRange(90)">90天</button>
          <button class="date-btn" :class="dateRange === 0 ? 'active' : ''" @click="setDateRange(0)">全部</button>
        </div>

        <div class="w-px h-4 bg-gray-700"></div>

        <!-- Score filter -->
        <select x-model="scoreFilter" class="input-field w-auto text-xs py-1">
          <option value="all">全部评分</option>
          <option value="high">高意向 (80+)</option>
          <option value="med">中等 (60-79)</option>
          <option value="low">低意向 (<60)</option>
        </select>

        <!-- Status filter -->
        <select x-model="statusFilter" class="input-field w-auto text-xs py-1">
          <option value="all">全部状态</option>
          <option value="decrypted">已解密</option>
          <option value="pending">待解密</option>
          <option value="followed">已跟进</option>
        </select>

        <!-- Country filter -->
        <select x-model="countryFilter" class="input-field w-auto text-xs py-1">
          <option value="all">全部国家</option>
          <template x-for="c in uniqueCountries" :key="c">
            <option :value="c" x-text="c"></option>
          </template>
        </select>

        <div class="ml-auto flex items-center gap-2">
          <span class="text-xs text-gray-500">排序:</span>
          <select x-model="sortBy" class="input-field w-auto text-xs py-1">
            <option value="time">时间↓</option>
            <option value="score">评分↓</option>
            <option value="decrypts">解密数↓</option>
            <option value="buyer">买家A-Z</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- KPI SUMMARY -->
  <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4">
    <div class="kpi-card">
      <div class="text-xs text-gray-500 mb-1">总线索</div>
      <div class="text-lg font-bold text-white" x-text="kpi.total"></div>
    </div>
    <div class="kpi-card">
      <div class="text-xs text-gray-500 mb-1">已解密</div>
      <div class="text-lg font-bold gold" x-text="kpi.decrypted"></div>
    </div>
    <div class="kpi-card">
      <div class="text-xs text-gray-500 mb-1">已跟进</div>
      <div class="text-lg font-bold text-green-400" x-text="kpi.followed"></div>
    </div>
    <div class="kpi-card">
      <div class="text-xs text-gray-500 mb-1">转化率</div>
      <div class="text-lg font-bold text-white" x-text="kpi.conversion + '%'"></div>
    </div>
    <div class="kpi-card">
      <div class="text-xs text-gray-500 mb-1">总消费</div>
      <div class="text-lg font-bold text-red-400" x-text="'¥' + kpi.totalCost.toFixed(0)"></div>
    </div>
  </div>

  <!-- AUDIT TABLE -->
  <div class="card overflow-hidden">
    <div class="p-3 border-b flex items-center justify-between" style="border-color:#1F2937;">
      <div class="flex items-center gap-2">
        <div class="check" :class="selectAll ? 'checked' : ''" @click="toggleSelectAll()"></div>
        <span class="text-xs text-gray-400" x-text="selectedIds.length > 0 ? '已选 ' + selectedIds.length + ' 条' : '审计日志'"></span>
      </div>
      <div class="flex items-center gap-2 no-print">
        <span class="text-xs text-gray-600 hidden md:inline" x-text="'显示 ' + paginatedClues.length + ' / ' + filteredClues.length"></span>
        <button x-show="selectedIds.length > 0" @click="bulkExport()" class="btn-outline btn-sm text-[10px]">批量导出</button>
        <button x-show="selectedIds.length > 0" @click="selectedIds = []" class="text-gray-500 hover:text-red-400 text-xs">取消</button>
      </div>
    </div>

    <div class="overflow-x-auto" style="max-height: calc(100vh - 340px); min-height: 300px;">
      <table class="audit-table">
        <thead>
          <tr>
            <th style="width:32px"></th>
            <th style="width:32px"></th>
            <th @click="sortBy = 'buyer'">买家</th>
            <th>国家</th>
            <th>来源</th>
            <th>关键词</th>
            <th @click="sortBy = 'score'">评分</th>
            <th>状态</th>
            <th>解密时间</th>
            <th>消费</th>
            <th>话术</th>
            <th style="width:60px"></th>
          </tr>
        </thead>
        <tbody>
          <template x-for="clue in paginatedClues" :key="clue.id">
            <template x-if="clue">
              <tr>
                <td>
                  <div class="check" :class="selectedIds.includes(clue.id) ? 'checked' : ''" @click="toggleSelect(clue.id)"></div>
                </td>
                <td>
                  <button @click="toggleExpand(clue.id)" class="text-gray-600 hover:text-amber-400 transition-colors">
                    <svg class="w-3 h-3 transition-transform" :class="expandedId === clue.id ? 'rotate-90' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                  </button>
                </td>
                <td>
                  <div class="flex items-center gap-1.5">
                    <div class="w-6 h-6 rounded-full bg-gray-700 flex items-center justify-center text-[10px] font-bold text-gray-300" x-text="clue.buyer.charAt(0)"></div>
                    <span class="text-gray-200 font-medium" x-html="highlight(clue.buyer)"></span>
                  </div>
                </td>
                <td>
                  <span class="text-xs" x-text="clue.flag + ' ' + clue.country"></span>
                </td>
                <td>
                  <span class="badge badge-blue" x-text="clue.source"></span>
                </td>
                <td>
                  <span class="badge badge-med" x-html="highlight(clue.keyword)"></span>
                </td>
                <td>
                  <span class="badge" :class="clue.score >= 80 ? 'badge-high' : clue.score >= 60 ? 'badge-med' : 'badge-low'" x-text="clue.score"></span>
                </td>
                <td>
                  <span class="badge" :class="clue.status === 'decrypted' ? 'badge-green' : clue.status === 'followed' ? 'badge-high' : 'badge-low'"
                        x-text="clue.status === 'decrypted' ? '已解密' : clue.status === 'followed' ? '已跟进' : '待解密'"></span>
                </td>
                <td class="text-gray-500 text-xs mono" x-text="clue.decryptTime || '—'"></td>
                <td class="text-gray-400 text-xs" x-text="clue.cost > 0 ? '¥' + clue.cost : '—'"></td>
                <td>
                  <span x-show="clue.hasScript" class="text-amber-400 text-xs cursor-pointer hover:underline" @click="viewScript(clue)">查看</span>
                  <span x-show="!clue.hasScript" class="text-gray-700 text-xs">—</span>
                </td>
                <td>
                  <div class="flex gap-1">
                    <button @click="toggleExpand(clue.id)" class="text-gray-500 hover:text-amber-400 text-xs" title="详情">i</button>
                    <button x-show="clue.status !== 'followed'" @click="markFollowed(clue)" class="text-gray-500 hover:text-green-400 text-xs" title="标记跟进">✓</button>
                  </div>
                </td>
              </tr>
            </template>
          </template>

          <!-- Expanded row detail -->
          <template x-for="clue in paginatedClues" :key="'detail-' + clue.id">
            <template x-if="expandedId === clue.id">
              <tr class="row-detail">
                <td colspan="12" class="row-expand">
                  <div class="p-4 grid md:grid-cols-3 gap-4">
                    <!-- Buyer info -->
                    <div class="space-y-2">
                      <div class="text-xs font-semibold text-amber-400 mb-2">买家信息</div>
                      <div class="text-xs"><span class="text-gray-500">名称:</span> <span class="text-gray-200" x-text="clue.buyer"></span></div>
                      <div class="text-xs"><span class="text-gray-500">国家:</span> <span class="text-gray-200" x-text="clue.flag + ' ' + clue.country"></span></div>
                      <div class="text-xs"><span class="text-gray-500">来源:</span> <span class="text-gray-200" x-text="clue.source"></span></div>
                      <div class="text-xs"><span class="text-gray-500">社区:</span> <span class="text-gray-200" x-text="clue.community"></span></div>
                      <div class="text-xs"><span class="text-gray-500">原文链接:</span> <span class="text-amber-400 hover:underline cursor-pointer" x-text="clue.url || '未保存'"></span></div>
                      <div class="text-xs"><span class="text-gray-500">采购量:</span> <span class="text-green-400 font-semibold" x-text="clue.moq || '未提供'"></span></div>
                    </div>
                    <!-- Purchase details -->
                    <div class="space-y-2">
                      <div class="text-xs font-semibold text-amber-400 mb-2">采购详情</div>
                      <div class="text-xs text-gray-300 leading-relaxed" x-text="clue.detail"></div>
                      <div class="text-xs"><span class="text-gray-500">预算:</span> <span class="text-gray-200" x-text="clue.budget || '未明确'"></span></div>

    calculateKPI() {

      this.kpi.conversion = this.kpi.total > 0 ? Math.round(this.kpi.followed / this.kpi.total * 100) : 0;
      this.kpi.totalCost = this.clues.reduce((sum, c) => sum + parseFloat(c.cost || 0), 0);

      return [...new Set(this.clues.map(c => c.country))].sort();

      return map[this.searchDim] || map.all;
    },

    get filteredClues() {
      let list = [...this.clues];

      // Search filter
      if (this.searchQuery) {
        const q = this.searchQuery.toLowerCase();
        list = list.filter(c => {
          switch (this.searchDim) {
            case 'buyer': return c.buyer.toLowerCase().includes(q);
            case 'country': return c.country.toLowerCase().includes(q);
            case 'source': return c.source.toLowerCase().includes(q);
            case 'keyword': return c.keyword.toLowerCase().includes(q);
            case 'script': return c.scripts.some(s => s.content.toLowerCase().includes(q));
            default: return c.buyer.toLowerCase().includes(q) || c.country.toLowerCase().includes(q) || c.source.toLowerCase().includes(q) || c.keyword.toLowerCase().includes(q) || c.scripts.some(s => s.content.toLowerCase().includes(q));
          }
        });
      }

      // Date range
      if (this.dateRange > 0) {
        const cutoff = Date.now() - this.dateRange * 86400000;
        list = list.filter(c => {
          if (!c.decryptTimestamp) return true; // pending always show
          return c.decryptTimestamp >= cutoff;
        });
      }

      // Score filter
      if (this.scoreFilter !== 'all') {
        list = list.filter(c => {
          if (this.scoreFilter === 'high') return c.score >= 80;
          if (this.scoreFilter === 'med') return c.score >= 60 && c.score < 80;
          return c.score < 60;
        });
      }

      // Status filter
      if (this.statusFilter !== 'all') {
        list = list.filter(c => c.status === this.statusFilter);
      }

      // Country filter
      if (this.countryFilter !== 'all') {
        list = list.filter(c => c.country === this.countryFilter);
      }

      // Sort
      list.sort((a, b) => {
        switch (this.sortBy) {
          case 'score': return b.score - a.score;
          case 'decrypts': return (b.decryptCount || 0) - (a.decryptCount || 0);
          case 'buyer': return a.buyer.localeCompare(b.buyer);
          default: return (b.decryptTimestamp || 0) - (a.decryptTimestamp || 0);
        }
      });

      return list;
    },

      return Math.max(1, Math.ceil(this.filteredClues.length / this.pageSize));

      const pages = [];
      pages.push(1);
      if (current > 3) pages.push('...');
      const start = Math.max(2, current - 1);
      const end = Math.min(total - 1, current + 1);
      for (let i = start; i <= end; i++) pages.push(i);
      if (current < total - 2) pages.push('...');
      pages.push(total);
      return pages;
    },

    get paginatedClues() {
      const start = (this.currentPage - 1) * this.pageSize;
      return this.filteredClues.slice(start, start + this.pageSize);
    },

    setDateRange(days) {
      this.dateRange = days;
      this.currentPage = 1;
    },

    toggleExpand(id) {
      this.expandedId = this.expandedId === id ? null : id;
    },

    toggleSelect(id) {
      const idx = this.selectedIds.indexOf(id);
      if (idx > -1) this.selectedIds.splice(idx, 1);
      else this.selectedIds.push(id);
      this.selectAll = this.selectedIds.length === this.filteredClues.length;
    },

    toggleSelectAll() {
      if (this.selectedIds.length === this.filteredClues.length) {
        this.selectedIds = [];
        this.selectAll = false;
      } else {
        this.selectedIds = this.filteredClues.map(c => c.id);
        this.selectAll = true;
      }
    },

    markFollowed(clue) {
      clue.status = 'followed';
      this.calculateKPI();
      this.showToast('已标记为已跟进', 'success');
    },

    viewScript(clue) {
      this.scriptClue = clue;
      this.scriptVersion = 0;
      this.showScriptModal = true;
    },

    copyScript() {
      if (this.scriptClue?.scripts[this.scriptVersion]) {
        navigator.clipboard.writeText(this.scriptClue.scripts[this.scriptVersion].content);
        this.showToast('话术已复制到剪贴板', 'success');
      }
    },

    highlight(text) {
      if (!this.searchQuery || !text) return text;
      const q = this.searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return text.replace(new RegExp(q, 'gi'), (m) => `<span class="highlight">${m}</span>`);
    },

    exportCSV() {
      const headers = ['ID', '买家', '国家', '来源', '社区', '关键词', '评分', '状态', '解密时间', '消费', '采购量', '预算', '认证', '口岸', '采购详情'];
      const rows = this.filteredClues.map(c => [
        c.id, c.buyer, c.country, c.source, c.community, c.keyword, c.score,
        c.status, c.decryptTime || '', c.cost || '', c.moq || '', c.budget || '',
        c.cert || '', c.port || '', (c.detail || '').replace(/[\n,]/g, ' '),
      ]);

      let csv = '\uFEFF' + headers.join(',') + '\n';
      rows.forEach(r => csv += r.map(v => `"${v}"`).join(',') + '\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `线索审计_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      this.showToast('CSV已导出 (' + rows.length + ' 条)', 'success');
    },

    exportPDF() {
      this.showToast('正在生成PDF...', 'info');
      setTimeout(() => {
        window.print();
        this.showToast('PDF打印窗口已打开', 'success');
      }, 500);
    },

    exportSingle(clue) {
      const headers = ['ID', '买家', '国家', '来源', '关键词', '评分', '状态', '采购量', '预算', '认证', '口岸', '详情'];
      const row = [clue.id, clue.buyer, clue.country, clue.source, clue.keyword, clue.score, clue.status, clue.moq || '', clue.budget || '', clue.cert || '', clue.port || '', (clue.detail || '').replace(/[\n,]/g, ' ')];
      let csv = '\uFEFF' + headers.join(',') + '\n' + row.map(v => `"${v}"`).join(',');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `线索_${clue.buyer}_${clue.id}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      this.showToast('线索已导出', 'success');
    },

    bulkExport() {
      const selected = this.clues.filter(c => this.selectedIds.includes(c.id));
      const headers = ['ID', '买家', '国家', '来源', '关键词', '评分', '状态', '采购量', '预算', '认证', '口岸', '详情'];
      let csv = '\uFEFF' + headers.join(',') + '\n';
      selected.forEach(c => {
        const row = [c.id, c.buyer, c.country, c.source, c.keyword, c.score, c.status, c.moq || '', c.budget || '', c.cert || '', c.port || '', (c.detail || '').replace(/[\n,]/g, ' ')];
        csv += row.map(v => `"${v}"`).join(',') + '\n';
      });
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `批量导出_${selected.length}条_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      this.showToast('已导出 ' + selected.length + ' 条线索', 'success');
    },

    showToast(msg, type = 'info') {
      this.toast = { show: true, msg, type };
      setTimeout(() => this.toast.show = false, 3000);
    },
  };
}
</script>

<style>[x-cloak]{display:none!important}</style>
